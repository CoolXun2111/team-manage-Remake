<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT Team 兑换</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/user.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>GPT Team 兑换</h1>
            <p class="subtitle">使用兑换码加入 ChatGPT Team</p>
            {% if remaining_spots is not none %}
            <div class="spots-badge">
                <i data-lucide="users"></i>
                <span>剩余车位: {{ remaining_spots }}</span>
            </div>
            {% endif %}

            {% if after_sales_group_url %}
            <a class="support-entry" href="{{ after_sales_group_url }}" target="_blank" rel="noopener noreferrer">
                <span class="support-entry-icon">
                    <i data-lucide="messages-square"></i>
                </span>
                <span class="support-entry-copy">
                    <strong>售后群入口</strong>
                    <span>兑换后遇到问题，可直接进群联系售后处理</span>
                </span>
                <span class="support-entry-arrow">
                    <i data-lucide="arrow-up-right"></i>
                </span>
            </a>
            {% endif %}
        </div>

        <div id="step1" class="step active">
            <div class="card">
                <h2>输入兑换信息</h2>
                <form id="verifyForm">
                    <div class="form-group">
                        <label for="email">邮箱地址</label>
                        <input type="email" id="email" name="email" required placeholder="请输入您的邮箱地址" class="form-input">
                        <p class="form-help">请填写您要接收邀请的账号邮箱，邀请会发送到此邮箱。</p>
                    </div>

                    <div class="form-group">
                        <label for="code">兑换码</label>
                        <input type="text" id="code" name="code" required placeholder="请输入兑换码" class="form-input">
                    </div>

                    <button type="submit" class="btn btn-primary" id="verifyBtn">
                        <i data-lucide="shield-check"></i> 验证兑换码
                    </button>
                </form>

                <div class="warranty-section">
                    <h3>
                        <i data-lucide="shield"></i>
                        质保查询
                    </h3>
                    <p class="form-help warranty-help">
                        如果您使用质保兑换码加入的 Team 被封号，可以在质保期内重复使用原兑换码查询状态并进行处理。
                    </p>
                    <div class="form-group warranty-input-group">
                        <input type="text" id="warrantyInput" placeholder="请输入原兑换码或邮箱进行查询" class="form-input">
                    </div>
                    <button type="button" class="btn btn-secondary" id="checkWarrantyBtn" onclick="checkWarranty()">
                        <i data-lucide="search"></i> 查询质保状态
                    </button>
                </div>
            </div>
        </div>

        <div id="warrantyResult" class="step" style="display: none;">
            <div class="card">
                <h2>质保查询结果</h2>
                <div id="warrantyContent"></div>
                <div class="actions result-actions">
                    <button onclick="backToStep1()" class="btn btn-secondary">返回</button>
                </div>
            </div>
        </div>

        <div id="step2" class="step" style="display: none;">
            <div class="card">
                <h2>选择 Team</h2>
                <div id="teamsList" class="teams-list"></div>
                <div class="actions">
                    <button onclick="backToStep1()" class="btn btn-secondary">返回</button>
                    <button onclick="autoSelectTeam()" class="btn btn-primary">自动选择</button>
                </div>
            </div>
        </div>

        <div id="step3" class="step">
            <div class="card">
                <div id="resultContent"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', path='/js/redeem.js') }}"></script>
    <script>
        if (window.lucide) lucide.createIcons();
    </script>
</body>

</html>
