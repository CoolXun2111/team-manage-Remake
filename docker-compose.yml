services:
  app:
    build: .
    container_name: ${CONTAINER_NAME:-team-manage-remake-app}
    ports:
      - "${HOST_PORT:-8008}:${APP_PORT:-8008}"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    restart: always
    environment:
      - APP_PORT=${APP_PORT:-8008}
      - DATABASE_URL=sqlite+aiosqlite:////app/data/team_manage.db
